name: Crypto Signal Check

on:
  schedule:
    # Jalan tiap 5 menit (selaras dengan candle 5 menit)
    - cron: "*/5 * * * *"
  workflow_dispatch:
    # Biar bisa di-trigger manual dari tab Actions di GitHub buat testing

jobs:
  check-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy requests

      - name: Run signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python crypto_signal_bot.py --symbol BTCUSDT --interval 5m --mode once

      - name: Simpan state (agar tidak kirim notif duplikat)
        run: |
          git config user.name "signal-bot"
          git config user.email "signal-bot@users.noreply.github.com"
          if [ -f last_signal_state.json ]; then
            git add last_signal_state.json
            git diff --staged --quiet && echo "Tidak ada perubahan state" || (git commit -m "Update state sinyal [skip ci]" && git push)
          else
            echo "Belum ada sinyal BUY/SELL, file state belum dibuat. Skip commit."
          fi
